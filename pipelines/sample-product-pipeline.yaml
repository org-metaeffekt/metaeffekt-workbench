projectProperties:
  project:
    name: "metaeffekt-workbench"
    version: "0.6.0"
    tenant: "metaeffekt"
  assets:
    - id: "sample-asset"
      name: "sample-asset"
      version: "1.0.0"
      reference: "inventories/example-reference-inventory/inventory"
      assessmentId: "sample-product-1"
      context: "local"
      urlResolver:
        url: "file:/home/goose/Projects/metaeffekt/metaeffekt-workbench/tests/resources/workspace-002/sample-product-1.0.0/02_prepared/sample-asset-1.0.0/sample-asset-1.0.0.xlsx"

reports:
  - assetId: "sample-asset"
    types: ["SDA", "CA", "VR", "VSR", "CR", "LD", "ILD"]
    organization: "metaeffekt"
    classificationRating: "DEFAULT"
    controlRating: "DEFAULT"
    watermark: "Sample"

# Dashboards define which assets should have vulnerability dashboards generated.
dashboards:
  - assetId: "sample-asset"

portfolioManager:
  project: "metaeffekt-workbench"
  assetGroup: "metaeffekt-workbench:0.1.0"

# Optional: global pipeline configuration
options:
  global:
    documentLanguage: "en"
    enableSpdxBom: true
    enableCycloneDxBom: true
  enrichment:
    securityPolicyFile: "policies/security-policy/security-policy.json"
    securityPolicyActiveIds: ["base_configuration"]
    activateCsaf: false
    activateMsrc: false

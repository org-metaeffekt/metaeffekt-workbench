                type: lower score
                metrics: AV:A
          - rationale: Applying only parts that lead to a lower/equal score
            modifications:
              - version: '3.1'
                type: lower score
                metrics: CVSS:3.1/MAV:A
          - rationale: Applying only parts that lead to a lower/equal score
            modifications:
